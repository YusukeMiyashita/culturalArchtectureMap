<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>文化財建造物マップ</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.9.0/ol.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="header">
            <h1>文化財建造物マップ</h1>
            <form id="search-form" class="search-form">
                <label for="size">最大件数：</label>
                <input type="number" id="size" value="20" min="20" max="500" step="10">
                <button type="submit">検索</button>
            </form>
        </header>
        <main class="main">
            <div id="map" class="map-container"></div>
            <aside id="list" class="results-list"></aside>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/ol@v10.9.0/dist/ol.js"></script>
        <script src="culturalArchtectureMap.js"></script>
        <script>
            document.getElementById('search-form').addEventListener('submit', (e) => {
                e.preventDefault();
                query();
            });
            init();
        </script>
    </body>
</html>
